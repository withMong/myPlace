# StarRocks 를 Grafana MySQL 데이터소스로 연결.
# StarRocks 는 MySQL wire protocol(9030)을 그대로 말하므로 별도 플러그인이 필요 없다.
apiVersion: 1

datasources:
  - name: StarRocks
    uid: starrocks
    type: mysql
    access: proxy
    url: starrocks-fe:9030
    user: root
    database: subway
    isDefault: true
    editable: true
    jsonData:
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
    secureJsonData:
      password: ""
