name: ${COMPOSE_PROJECT_NAME:-seoul-subway}

services:
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.1}
    hostname: kafka
    container_name: subway-kafka
    extra_hosts:
      - "kafka:127.0.0.1"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - lakehouse

  kafka-init:
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.1}
    container_name: subway-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:19092 \
          --create \
          --if-not-exists \
          --topic ${KAFKA_TOPIC:-subway-events} \
          --partitions 3 \
          --replication-factor 1 \
        && /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:19092 \
          --describe \
          --topic ${KAFKA_TOPIC:-subway-events}
    networks:
      - lakehouse
    restart: "no"

  kafka-ui:
    image: ${KAFKA_UI_IMAGE:-provectuslabs/kafka-ui:latest}
    hostname: kafka-ui
    container_name: subway-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_HOST_PORT:-8088}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: de5-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - lakehouse

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    hostname: minio
    container_name: subway-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - lakehouse

  minio-init:
    image: ${MINIO_CLIENT_IMAGE:-minio/mc:latest}
    container_name: subway-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} \
        && mc mb --ignore-existing local/${MINIO_WAREHOUSE_BUCKET:-warehouse} \
        && mc mb --ignore-existing local/${MINIO_PAIMON_BUCKET:-paimon} \
        && mc mb --ignore-existing local/${MINIO_STARROCKS_BUCKET:-starrocks} \
        && (mc admin user svcacct add \
          --access-key ${STARROCKS_MINIO_ACCESS_KEY:-AAAAAAAAAAAAAAAAAAAA} \
          --secret-key ${STARROCKS_MINIO_SECRET_KEY:-BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB} \
          local ${MINIO_ROOT_USER:-minioadmin} 2>/tmp/minio-svcacct.err \
          || case "$$(cat /tmp/minio-svcacct.err)" in \
            *already*) echo "StarRocks MinIO service account already exists; skip" ;; \
            *) cat /tmp/minio-svcacct.err >&2 && exit 1 ;; \
          esac) \
        && mc ls local
    networks:
      - lakehouse
    restart: "no"

  iceberg-postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    hostname: iceberg-postgres
    container_name: subway-iceberg-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    environment:
      POSTGRES_USER: ${ICEBERG_DB_USER:-iceberg}
      POSTGRES_PASSWORD: ${ICEBERG_DB_PASSWORD:-iceberg}
      POSTGRES_DB: ${ICEBERG_DB_NAME:-iceberg}
    volumes:
      - iceberg-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ICEBERG_DB_USER:-iceberg} -d ${ICEBERG_DB_NAME:-iceberg}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - lakehouse

  iceberg-rest:
    image: ${ICEBERG_REST_IMAGE:-tabulario/iceberg-rest:1.6.0}
    hostname: iceberg-rest
    container_name: subway-iceberg-rest
    depends_on:
      iceberg-postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://${MINIO_WAREHOUSE_BUCKET:-warehouse}/
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/${ICEBERG_DB_NAME:-iceberg}
      CATALOG_JDBC_USER: ${ICEBERG_DB_USER:-iceberg}
      CATALOG_JDBC_PASSWORD: ${ICEBERG_DB_PASSWORD:-iceberg}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    volumes:
      - iceberg-rest-data:/catalog
    networks:
      - lakehouse

  flink-jobmanager:
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
      args:
        FLINK_BASE_IMAGE: ${FLINK_BASE_IMAGE:-flink:1.20.4-scala_2.12-java17}
        FLINK_KAFKA_CONNECTOR_VERSION: ${FLINK_KAFKA_CONNECTOR_VERSION:-3.4.0-1.20}
        PAIMON_VERSION: ${PAIMON_VERSION:-1.4.1}
        FLINK_SHADED_HADOOP_VERSION: ${FLINK_SHADED_HADOOP_VERSION:-2.8.3-10.0}
    image: ${FLINK_IMAGE:-de5-flink:1.20.4-paimon}
    hostname: flink-jobmanager
    container_name: subway-flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
        taskmanager.numberOfTaskSlots: 2
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.interval: 30s
      JVM_ARGS: "-Xms512m -Xmx1024m"
    volumes:
      - ./labs:/workspace/labs
      - ./data:/workspace/data
      - flink-checkpoints:/opt/flink/checkpoints
      - paimon-warehouse:/warehouse/paimon
    networks:
      - lakehouse

  flink-taskmanager:
    image: ${FLINK_IMAGE:-de5-flink:1.20.4-paimon}
    pull_policy: never
    container_name: subway-flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1536m
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.interval: 30s
      JVM_ARGS: "-Xms512m -Xmx1024m"
    volumes:
      - ./labs:/workspace/labs
      - ./data:/workspace/data
      - flink-checkpoints:/opt/flink/checkpoints
      - paimon-warehouse:/warehouse/paimon
    networks:
      - lakehouse

  flink-sql-client:
    image: ${FLINK_IMAGE:-de5-flink:1.20.4-paimon}
    pull_policy: never
    container_name: subway-flink-sql-client
    command: bin/sql-client.sh
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
    volumes:
      - ./labs:/workspace/labs
      - ./data:/workspace/data
      - paimon-warehouse:/warehouse/paimon
    networks:
      - lakehouse
    profiles:
      - tools

  kafka-producer:
    build:
      context: docker/producer
      args:
        CONFLUENT_KAFKA_VERSION: ${CONFLUENT_KAFKA_VERSION:-2.14.0}
    image: ${PRODUCER_IMAGE:-de5-producer:python3.12}
    container_name: subway-kafka-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    entrypoint:
      - python
      - /workspace/labs/03-kafka-producer/producer.py
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:19092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-subway-events}
      KAFKA_INPUT: /workspace/data/sample/commerce_events_sample.jsonl
      KAFKA_KEY_FIELD: user_session
    volumes:
      - ./labs:/workspace/labs
      - ./data:/workspace/data
    networks:
      - lakehouse
    profiles:
      - tools

  subway-producer:
    build:
      context: docker/producer
      dockerfile: Dockerfile.subway
      args:
        CONFLUENT_KAFKA_VERSION: ${CONFLUENT_KAFKA_VERSION:-2.14.0}
    image: ${SUBWAY_PRODUCER_IMAGE:-de5-subway-producer:python3.12}
    container_name: subway-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    entrypoint:
      - python
      - /workspace/labs/03-kafka-producer/subway_producer.py
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:19092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-subway-events}
      KAFKA_KEY_FIELD: train_no
      SEOUL_API_KEY: ${SEOUL_API_KEY:?SEOUL_API_KEY is required}
      SUBWAY_LINES: ${SUBWAY_LINES:-1호선,2호선,3호선,4호선,5호선,6호선,7호선,8호선,9호선}
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
    volumes:
      - ./labs:/workspace/labs
      - ./data:/workspace/data
    networks:
      - lakehouse
    profiles:
      - tools

  spark-client:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_BASE_IMAGE: ${SPARK_BASE_IMAGE:-apache/spark:3.5.6}
    image: ${SPARK_IMAGE:-de5-spark:3.5.6}
    container_name: subway-spark-client
    command: ["sleep", "infinity"]
    depends_on:
      iceberg-rest:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      SPARK_LOCAL_IP: spark-client
    volumes:
      - ./labs:/workspace/labs
      - ./data:/workspace/data
      - ./scripts:/workspace/scripts
      - paimon-warehouse:/warehouse/paimon
      - spark-ivy-cache:/home/spark/.ivy2
    networks:
      - lakehouse

  starrocks-fe:
    image: ${STARROCKS_FE_IMAGE:-starrocks/fe-ubuntu:4.0-latest}
    hostname: starrocks-fe
    container_name: subway-starrocks-fe
    user: root
    command:
      - /bin/bash
      - -lc
      - |
        ensure_fe_conf() {
          key="$1"
          value="$2"
          grep -q "^$${key} =" /opt/starrocks/fe/conf/fe.conf || echo "$${key} = $${value}" >> /opt/starrocks/fe/conf/fe.conf
        }
        ensure_fe_conf run_mode shared_data
        ensure_fe_conf cloud_native_storage_type S3
        ensure_fe_conf tablet_create_timeout_second 300
        ensure_fe_conf enable_statistic_collect false
        ensure_fe_conf enable_statistic_collect_on_first_load false
        ensure_fe_conf enable_collect_full_statistic false
        /opt/starrocks/fe/bin/start_fe.sh --host_type FQDN
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${STARROCKS_FE_HTTP_PORT:-8030}:8030"
      - "${STARROCKS_FE_QUERY_PORT:-9030}:9030"
      - "9020:9020"
    volumes:
      - ./labs:/workspace/labs
      - ./scripts:/workspace/scripts
      - starrocks-fe-meta:/opt/starrocks/fe/meta
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -h starrocks-fe -P9030 -e 'SHOW FRONTENDS\\G' 2>/dev/null | grep 'Alive: true'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - lakehouse

  starrocks-cn:
    image: ${STARROCKS_CN_IMAGE:-starrocks/cn-ubuntu:4.0-latest}
    hostname: starrocks-cn
    container_name: subway-starrocks-cn
    user: root
    command:
      - /bin/bash
      - -lc
      - |
        sleep 15
        ulimit -u 65535
        ulimit -n 65535
        mysql --connect-timeout 2 -h starrocks-fe -P9030 -uroot \
          -e 'ALTER SYSTEM ADD COMPUTE NODE "starrocks-cn:9050";' || true
        /opt/starrocks/cn/bin/start_cn.sh
    environment:
      HOST_TYPE: FQDN
    depends_on:
      starrocks-fe:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${STARROCKS_CN_HTTP_PORT:-8040}:8040"
    volumes:
      - starrocks-cn-storage:/opt/starrocks/cn/storage
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -h starrocks-fe -P9030 -e 'SHOW COMPUTE NODES\\G' 2>/dev/null | grep 'Alive: true'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - lakehouse

  airflow-postgres:
    image: ${AIRFLOW_DB_IMAGE:-postgres:15-alpine}
    hostname: airflow-postgres
    container_name: subway-airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - lakehouse
    profiles:
      - orchestration

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        AIRFLOW_BASE_IMAGE: ${AIRFLOW_BASE_IMAGE:-apache/airflow:2.10.5-python3.11}
        CONFLUENT_KAFKA_VERSION: ${CONFLUENT_KAFKA_VERSION:-2.14.0}
        OPENMETADATA_INGESTION_VERSION: ${OPENMETADATA_INGESTION_VERSION:-1.12.6.4}
    image: ${AIRFLOW_IMAGE:-de5-airflow:2.10.5}
    container_name: subway-airflow-init
    user: "0:0"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-de5-lite-airflow-secret}
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    volumes:
      - airflow-logs:/opt/airflow/logs
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        /home/airflow/.local/bin/airflow db migrate
        /home/airflow/.local/bin/airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Data \
          --lastname Engineer \
          --role Admin \
          --email admin@example.com \
        || echo "Airflow admin user already exists or was created by another init run."
    networks:
      - lakehouse
    profiles:
      - orchestration
    restart: "no"

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-de5-airflow:2.10.5}
    pull_policy: never
    container_name: subway-airflow-webserver
    user: "0:0"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_HOST_PORT:-8080}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-de5-lite-airflow-secret}
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost:${AIRFLOW_HOST_PORT:-8080}}
      DE5_KAFKA_BOOTSTRAP: kafka:19092
      DE5_KAFKA_TOPIC: ${KAFKA_TOPIC:-subway-events}
      AIRFLOW__LINEAGE__BACKEND: ${AIRFLOW__LINEAGE__BACKEND:-}
      AIRFLOW__LINEAGE__AIRFLOW_SERVICE_NAME: ${AIRFLOW__LINEAGE__AIRFLOW_SERVICE_NAME:-}
      AIRFLOW__LINEAGE__OPENMETADATA_API_ENDPOINT: ${AIRFLOW__LINEAGE__OPENMETADATA_API_ENDPOINT:-}
      AIRFLOW__LINEAGE__JWT_TOKEN: ${AIRFLOW__LINEAGE__JWT_TOKEN:-}
      AIRFLOW__LINEAGE__ONLY_KEEP_DAG_LINEAGE: ${AIRFLOW__LINEAGE__ONLY_KEEP_DAG_LINEAGE:-}
      AIRFLOW__LINEAGE__TIMEOUT: ${AIRFLOW__LINEAGE__TIMEOUT:-}
    volumes:
      - ./labs/06-airflow-orchestration/dags:/opt/airflow/dags
      - ./data:/opt/airflow/workspace/data:ro
      - ./labs:/opt/airflow/workspace/labs:ro
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lakehouse
    profiles:
      - orchestration

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-de5-airflow:2.10.5}
    pull_policy: never
    container_name: subway-airflow-scheduler
    user: "0:0"
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      spark-client:
        condition: service_started
      starrocks-cn:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-de5-lite-airflow-secret}
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost:${AIRFLOW_HOST_PORT:-8080}}
      DE5_KAFKA_BOOTSTRAP: kafka:19092
      DE5_KAFKA_TOPIC: ${KAFKA_TOPIC:-subway-events}
      AIRFLOW__LINEAGE__BACKEND: ${AIRFLOW__LINEAGE__BACKEND:-}
      AIRFLOW__LINEAGE__AIRFLOW_SERVICE_NAME: ${AIRFLOW__LINEAGE__AIRFLOW_SERVICE_NAME:-}
      AIRFLOW__LINEAGE__OPENMETADATA_API_ENDPOINT: ${AIRFLOW__LINEAGE__OPENMETADATA_API_ENDPOINT:-}
      AIRFLOW__LINEAGE__JWT_TOKEN: ${AIRFLOW__LINEAGE__JWT_TOKEN:-}
      AIRFLOW__LINEAGE__ONLY_KEEP_DAG_LINEAGE: ${AIRFLOW__LINEAGE__ONLY_KEEP_DAG_LINEAGE:-}
      AIRFLOW__LINEAGE__TIMEOUT: ${AIRFLOW__LINEAGE__TIMEOUT:-}
    volumes:
      - ./labs/06-airflow-orchestration/dags:/opt/airflow/dags
      - ./data:/opt/airflow/workspace/data:ro
      - ./labs:/opt/airflow/workspace/labs:ro
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lakehouse
    profiles:
      - orchestration

networks:
  lakehouse:
    name: de5-lite-lakehouse

volumes:
  kafka-data:
  minio-data:
  iceberg-postgres-data:
  iceberg-rest-data:
  flink-checkpoints:
  paimon-warehouse:
  spark-ivy-cache:
  starrocks-fe-meta:
  starrocks-cn-storage:
  airflow-postgres-data:
  airflow-logs:
